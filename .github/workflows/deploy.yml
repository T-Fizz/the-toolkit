name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TAKUMI_VERSION: v1.0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install takumi
        run: |
          curl -fsSL "https://github.com/T-Fizz/takumi/releases/download/${TAKUMI_VERSION}/takumi_${TAKUMI_VERSION#v}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin takumi
          takumi --version

      - name: Install dependencies
        run: takumi run install

      - name: Build
        run: takumi build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
